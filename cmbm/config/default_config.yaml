# Configuration file for CMBM
# Cloud-by-cloud Multiphase Bayesian ionization Modeling

# ==============================================================================
# DATA PATHS - Update these paths for your data
# ==============================================================================
dataset_path: "/ourdisk/hpc/cgmflows/sameer/dont_archive/KCWI-HIRES-Catalog/J143040+014939/2.07079/VP/savegoodresult3.hdf5"                          # Path to VoigtFit dataset (.hdf5)
voigtfit_path: "/ourdisk/hpc/cgmflows/sameer/dont_archive/KCWI-HIRES-Catalog/J143040+014939/2.07079/VP/bestfit_result3_master_a.pickle"                         # Path to VoigtFit results (.pickle)  
mask_path: "/ourdisk/hpc/cgmflows/sameer/dont_archive/KCWI-HIRES-Catalog/J143040+014939/2.07079/Masking/mask_a.pkl"                             # Path to velocity masks (.pkl)
transition_library_path: "/ourdisk/hpc/cgmflows/sameer/dont_archive/KCWI-HIRES-Catalog/J143040+014939/2.07079/AtomData/atomdata_updated_new.dat"              # Path to atomic transition data file

# Grid paths for Cloudy models
grids:
  thin: '/ourdisk/hpc/cgmflows/sameer/dont_archive/testing/Nipiethin.pkl'
  thick: '/ourdisk/hpc/cgmflows/sameer/dont_archive/testing/Nipiethick.pkl'
# ==============================================================================
# FITTING CONFIGURATION
# ==============================================================================

# Phase structure - defines the physical components to fit
# Each phase can contain multiple clouds with different ionization states
phases:
  Ph1: ['MgII_0']
  Ph2: ['CIV_0', 'CIV_1']
  Ph3: ['SiIII_0', 'SiIII_1', 'SiIII_2']

alpha_params:
  MgII_0: ['Mgalpha']
  CIV_1:  ['Nalpha']
  SiIII_0: ['Nalpha']
  SiIII_1: ['Nalpha']

alpha_bounds:
  Mgalpha: [0.0, 2.0]
  Nalpha:  [-3.0, 0.0]
  Calpha:  [-1.0, 1.0]

prior_settings:
  z_sigma: 2        # number of sigma around VoigtFit z value
  bturb_sigma: 2    # number of sigma for bturb upper bound
  NHI_min: 10.0     # if not set, read from grid axes
  NHI_max: 22.0     # if not set, read from grid axes

# Spectral lines to include in the fit
use_lines: ["HI_1215",
"AlII_1670",
"AlIII_1862",
"AlIII_1854",
"CII_1334",
"CIV_1548",
"CIV_1550",
"FeII_2600",
"MgI_2852",
"MgII_2796",
"MgII_2803",
"MnII_2576",
"NII_1083",
"NV_1238",
"NV_1242",
"OI_1302",
"SII_1253",
"SII_1250",
"SiII_1526",
"SiII_1260",
"SiIII_1206",
"SiIV_1393",
"SiIV_1402",
"TiII_1910"
]

# Available ions in Cloudy grids (used for column density interpolation)
cloudy_ions: ['HI','NI','NII','NIII','NIV','NV','SiI','SiII','SiIII','SiIV','OI','OII','OIII','OIV','OV','OVI','CI','CII','CIII','CIV','FeI','FeII','FeIII','SI','SII','SIII','SIV','SV','SVI','PI','PII','PIII','PIV','AlI','AlII','AlIII','MgII','MgI','CaII','MnII','ZnII','TiII','CaI','NaI','NeVIII','MgX']
# ==============================================================================
# MASKING CONFIGURATION
# ==============================================================================

masks:
  velocity_limits:
    lowlim: -220
    uplim: -77
    maxvel: 400

# ==============================================================================
# NESTED SAMPLING PARAMETERS
# ==============================================================================

# Basic sampling settings
min_num_live_points: 400                    # Number of live points
dlogz: 50                                  # Target evidence accuracy (will be adjusted by ndim)
min_ess: 50                                # Minimum effective sample size
nsteps_factor: 1                            # Step sampler steps = nsteps_factor * ndim

# Advanced sampling settings
update_interval_volume_fraction: 0.5        # Volume update interval
max_num_improvement_loops: -1               # Maximum improvement loops (-1 = no limit)

# ==============================================================================
# OUTPUT SETTINGS
# ==============================================================================

output_dir: "/ourdisk/hpc/cgmflows/sameer/dont_archive/testing/MgII0CIV01SiIII012"                  # Output directory name
resume: true                                # Resume previous run if available

# ==============================================================================
# GALAXY REDSHIFT
# ==============================================================================

# System redshift from VoigtFit dataset (z_sys)
# This is automatically loaded from the VoigtFit file

# Galaxy redshift for velocity reference in plots
# If not specified (null), z_sys will be used
zgal: 2.07079
# Example: zgal: 0.2284


# ==============================================================================
# PLOTTING CONFIGURATION
# ==============================================================================

plotting:
  # Velocity range for plots [vmin, vmax] in km/s
  velocity_range: [-290, -10]
  # Lines to exclude from model comparison plot
  deactivate_lines: [ 'CI_1560',
