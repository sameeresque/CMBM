  masked_lines: []



# ==============================================================================
# SLURM JOB SETTINGS
# ==============================================================================

slurm:
  job_name: "MgII0CIV01SiIII012"           # Job name (-J flag)
  partition: "sooner_test_32gb_20core"       # Partition name (--partition)
  container: "el9hw"             # Container image (--container)
  chdir: "/ourdisk/hpc/cgmflows/sameer/dont_archive/testing/"
  nodes: 5                       # Number of nodes (--nodes)
  ntasks_per_node: 20             # MPI tasks per node (--ntasks-per-node)
  mem: "28G"             # Memory per CPU (--mem-per-cpu)
  time: "06:00:00"               # Wall time (--time, HH:MM:SS)
  output: "/ourdisk/hpc/cgmflows/sameer/dont_archive/testing/MgII0CIV01SiIII012/"
