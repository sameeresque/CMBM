# ==============================================================================
# CMBM Sample Configuration File
# ==============================================================================
# This is a complete, working example configuration for CMBM.
# Copy this file and modify the paths and parameters for your specific system.
#
# Usage:
#   import cmbm
#   fitter = cmbm.CMBMFitter('sample_config.yaml')
#   fitter.load_data()
#   results = fitter.run_fit()
#
# ==============================================================================

# ==============================================================================
# DATA FILES - UPDATE THESE PATHS FOR YOUR DATA
# ==============================================================================

# Path to VoigtFit dataset file (.hdf5)
# This contains your observed spectra, wavelength arrays, errors, and line definitions
dataset_path: "/path/to/your/dataset.hdf5"

# Path to VoigtFit results file (.pickle)
# This provides initial parameter estimates for setting prior bounds
voigtfit_path: "/path/to/your/bestfit_result.pickle"

# Path to velocity masks file (.pkl)
# Defines which velocity regions to include in the fit
mask_path: "/path/to/your/velocity_masks.pkl"

# Path to atomic transition data file
# Contains rest wavelengths, oscillator strengths, and damping parameters
transition_library_path: "/path/to/your/atomdata.dat"

# Paths to Cloudy photoionization model grids
grid_paths:
  gridpath: "/path/to/your/thingrid"
  gridpath_thick: "/path/to/your/thickgrid"

# Grid redshift identifier (typically the grid filename contains this)
# Common values: "0.0", "0.2", "0.5", "1.0", "2.0"
grid_z: "0.2"

# ==============================================================================
# ABSORPTION SYSTEM DEFINITION
# ==============================================================================

# Define the phase structure of your absorption system
# Each phase can contain multiple cloud components
# Format: "Ion_ComponentID" where ComponentID is a unique integer
#
# Example interpretations:
#   Low_ionization: Cool gas phase (T ~ 10^4 K)
#   High_ionization: Hot gas phase (T ~ 10^5 K)


phases:
  Ph1: ["SiIII_0", "HI_1"]


# ==============================================================================
# SPECTRAL LINES TO FIT
# ==============================================================================

# List of spectral lines to include in the fit
# Format: "Ion_Wavelength" (wavelength in Angstroms, no decimal point)
#
# Selection strategy:
#   - Include strong lines (high S/N) for each phase
#   - Include multiple transitions per ion when available
#   - Include HI Lyman series for column density constraints
#   - Exclude heavily blended or contaminated lines

use_lines: [
  "CII_1334", "CII_1036", "CIII_977", "FeII_1144", 
  "HI_1215", "HI_1025", "HI_972", "HI_949", "HI_937", "HI_930", "HI_926",
  "MgI_2852", "MgII_2796", "NII_1083", "NV_1238", "OI_1302", "OVI_1031",
  "SII_1253", "SIII_1012", "SiII_1190", "SiIII_1206", "SiIV_1393"
]


# ==============================================================================
# CLOUDY IONS
# ==============================================================================

# List of ions available in your Cloudy model grids
# CMBM will interpolate column densities for these ions
# This list should match what's available in your grid files

cloudy_ions: [
  "MgX", "AlII", "AlIII", "SIV", "CII", "HI", "CIV", "CIII", "SII", "TiII",
  "MgII", "NI", "OIII", "NaI", "SiII", "SiIII", "PIII", "NeVIII", "CaI", "FeI",
  "ZnII", "MnII", "SiIV", "SiI", "PI", "MgI", "NV", "CI", "SIII", "SVI",
  "FeII", "OIV", "CaII", "NII", "OII", "OI", "NIII", "AlI", "SI", "PII", "OV", "OVI"
]

# ==============================================================================
# PARAMETER BOUNDS
# ==============================================================================

parameter_bounds:
  NHI_min: 12.0   # Minimum HI column density (log cm^-2)
  NHI_max: 21.5   # Maximum HI column density (log cm^-2)

# ==============================================================================
# NESTED SAMPLING PARAMETERS
# ==============================================================================

# Number of live points for nested sampling
# More points = better exploration but slower
# Typical values:
#   - 200-400: Quick exploratory runs
#   - 400-800: Standard production runs
#   - 800-2000: High-precision runs
min_num_live_points: 400

# Target evidence accuracy (log evidence uncertainty)
# Lower values = tighter convergence but slower
# Note: Will be automatically adjusted by ndim (number of parameters)
# Typical values:
#   - 0.5: Standard runs
#   - 0.3: Higher precision
#   - 0.1: Publication-quality
dlogz: 0.5

# Minimum effective sample size
# Higher values = more posterior samples
# Typical values:
#   - 400: Standard
#   - 800-1000: Higher precision
min_ess: 400

# Step sampler configuration
# Number of steps = nsteps_factor × ndim
# Higher values = more thorough but slower
# Typical values:
#   - 2: Standard
#   - 3-4: More thorough exploration
nsteps_factor: 2

# Advanced sampling parameters (usually don't need to change)
update_interval_volume_fraction: 0.2
max_num_improvement_loops: -1  # -1 = no limit

# ==============================================================================
# OUTPUT SETTINGS
# ==============================================================================

# Output directory name (will be created if it doesn't exist)
# Results, plots, and logs will be saved here
output_dir: "outputdir"

# Resume from previous run if available
# Set to true to continue interrupted fits
# Set to false to start fresh (will overwrite existing results)
resume: true

# ==============================================================================
# EXAMPLE CONFIGURATION
# ==============================================================================

# ------------------------------------------------------------------------------
# EXAMPLE: Simple CGM Absorber (2 phases, 10 parameters)
# ------------------------------------------------------------------------------
# phases:
#   Low_ion: ["MgII_0"]
#   High_ion: ["CIV_0"]
# use_lines: ["MgII_2796", "SiII_1190", "CIV_1548", "OVI_1031", "HI_1215"]
# min_num_live_points: 400
# Estimated runtime: < 1 hour on 8 cores

# ==============================================================================
# NOTES AND TIPS
# ==============================================================================

# Performance optimization:
#   - Use fewer live points (200-400) initially
#   - Run with MPI: mpiexec -n 16 python fit_script.py
#   - Increase precision gradually after confirming model works

# Model selection strategy:
#   1. Start with simplest model
#   2. Compare evidence for different phase structures
#   3. Add complexity only if justified by Bayes factor
#   4. Prefer physical interpretability over model complexity

# Common issues:
#   - Parameters hitting bounds: Check VoigtFit initial values
#   - Slow convergence: Increase min_num_live_points
#   - Poor fits: Check velocity masks and phase structure
#   - Evidence unstable: Decrease dlogz, increase min_ess

# For help:
#   - Documentation: https://cmbm.readthedocs.io/
#   - GitHub: https://github.com/yourusername/cmbm
#   - Issues: https://github.com/yourusername/cmbm/issues
